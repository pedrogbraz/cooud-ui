# Dependabot — weekly dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Keep future GitHub Actions dependencies visible; this repo currently has no active workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # JS dependencies across the workspace (root manifest + every package/app).
  - package-ecosystem: npm
    directories:
      - /
      - /packages/ui
      - /packages/tokens
      - /packages/theme
      - /packages/cli
      - /packages/stack
      - /packages/ai-kit
      - /packages/create-cooud-app
      - /packages/create-cooud-stack
      - /packages/mcp
      - /apps/www
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
