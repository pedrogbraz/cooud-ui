name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege at the workflow level. The publish job widens this with the
# extra scopes it needs (id-token + attestations for build provenance).
permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    # Manual-approval gate: no publish runs until a required reviewer approves
    # this deployment in the "release" GitHub Environment. Configure required
    # reviewers + the v* tag deployment branch/tag policy in repo settings
    # (see docs/RELEASE_GOVERNANCE.md).
    environment:
      name: release

    permissions:
      contents: read
      packages: write # publish @cooud/* to GitHub Packages
      id-token: write # OIDC for build-provenance attestations
      attestations: write # write attestations to the attestation store

    steps:
      - name: Checkout
        # actions/checkout@v4.2.2 pinned by commit SHA (supply-chain hardening)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        # oven-sh/setup-bun@v2.0.2 pinned by commit SHA
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          # Pinned to the repo's packageManager (package.json: "bun@1.3.14").
          bun-version: 1.3.14

      # setup-node configures npm to publish to GitHub Packages under @cooud
      # (writes the registry-url + scope into ~/.npmrc and wires NODE_AUTH_TOKEN).
      - name: Setup Node (GitHub Packages registry)
        # actions/setup-node@v4.1.0 pinned by commit SHA
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@cooud"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release versions and secrets
        run: |
          set -euo pipefail

          release_version="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$release_version" node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const expected = process.env.RELEASE_VERSION;
          const packages = [
            "packages/tokens/package.json",
            "packages/theme/package.json",
            "packages/ui/package.json",
            "packages/cli/package.json",
          ];

          let ok = true;
          for (const file of packages) {
            const pkg = JSON.parse(readFileSync(file, "utf8"));
            if (pkg.version !== expected) {
              console.error(`${file}: version ${pkg.version} does not match tag v${expected}`);
              ok = false;
            }
          }

          if (!ok) process.exit(1);
          console.log(`release versions match v${expected}`);
          NODE

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required to publish the public npm CLI package."
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Registry check
        run: bun run registry:check

      - name: Tokens check
        run: bun run tokens:check

      - name: Build packages
        run: bun run build

      - name: Package smoke (full consumer fixtures)
        run: bun run package:smoke
        env:
          SMOKE_FULL: "1"

      # --- Pack first so attestations cover the EXACT bytes we publish. ---
      # Use `bun pm pack` (NOT `npm pack`): Bun rewrites the `workspace:*`
      # protocol to the resolved version (e.g. @cooud/theme -> @cooud/tokens
      # "0.1.0"), so the published tarball is installable by external consumers.
      # `npm pack` would leave `workspace:*` and break `npm install`.
      - name: Pack packages
        run: |
          set -euo pipefail
          mkdir -p dist-artifacts/github dist-artifacts/npm
          github_dest="$GITHUB_WORKSPACE/dist-artifacts/github"
          npm_dest="$GITHUB_WORKSPACE/dist-artifacts/npm"
          for pkg in tokens theme ui; do
            ( cd "packages/$pkg" && bun pm pack --destination "$github_dest" )
          done
          ( cd "packages/cli" && bun pm pack --destination "$npm_dest" )
          find dist-artifacts -maxdepth 2 -type f -print | sort

      # SBOM (CycloneDX) for the whole workspace, archived with the release.
      - name: Generate SBOM (CycloneDX)
        # anchore/sbom-action@v0.24.0 pinned by commit SHA
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist-artifacts/sbom.cyclonedx.json
          artifact-name: cooud-ui-sbom.cyclonedx.json

      # Build-provenance attestation over every packed tarball (and the SBOM).
      - name: Attest build provenance
        # actions/attest-build-provenance@v1.4.4 pinned by commit SHA
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: "dist-artifacts/**/*.tgz"

      - name: Upload release artifacts (tarballs + SBOM)
        # actions/upload-artifact@v4.6.2 pinned by commit SHA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cooud-ui-release-artifacts
          path: dist-artifacts/
          if-no-files-found: error

      # --- Publish the exact packed tarballs in dependency order. ---
      - name: Publish @cooud/tokens
        run: npm publish "$(ls dist-artifacts/github/cooud-tokens-*.tgz)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @cooud/theme
        run: npm publish "$(ls dist-artifacts/github/cooud-theme-*.tgz)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @cooud/ui
        run: npm publish "$(ls dist-artifacts/github/cooud-ui-*.tgz)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish cooud-ui CLI to public npm
        run: |
          set -euo pipefail
          userconfig="$(mktemp)"
          trap 'rm -f "$userconfig"' EXIT
          printf 'registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n' > "$userconfig"
          NPM_CONFIG_USERCONFIG="$userconfig" npm publish \
            "$(ls dist-artifacts/npm/cooud-ui-*.tgz)" \
            --registry https://registry.npmjs.org \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
