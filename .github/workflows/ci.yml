name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. No write scopes are granted.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2 pinned by commit SHA (supply-chain hardening)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        # oven-sh/setup-bun@v2.0.2 pinned by commit SHA
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          # Pinned to the repo's packageManager (package.json: "bun@1.3.14")
          # for reproducible CI. Do NOT use "latest".
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- Quality gates, in order. Each runs a root package.json script. ---

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      # Coverage gate. Runs the same vitest suite with V8 coverage on the
      # component-library surface (packages/ui/src/components/**). Thresholds in
      # vitest.config.ts are currently a ratchet floor of 0 — this step is the
      # hook that fails CI once the floor is raised and a future change drops
      # coverage below it (or deletes the tests that hold it up).
      - name: Coverage (component library, ratchet floor)
        run: bun run test:coverage

      - name: Registry check (CLI registry is in sync)
        run: bun run registry:check

      - name: Tokens check (generated tokens are in sync)
        run: bun run tokens:check

      - name: Example sections check (docs TOC metadata is in sync)
        run: bun run check:example-sections

      # Build before the artifact gates: package:smoke packs the built dist and
      # bundle:check reads the built apps/www bundle stats.
      - name: Build
        run: bun run build

      - name: Package smoke (consumer fixtures resolve subpath exports)
        run: bun run package:smoke
        env:
          SMOKE_FULL: "1"

      # Covers BOTH gates in scripts/bundle-check.mjs: @cooud/www first-load JS
      # per route AND the @cooud/ui published-package entries (gzipped per-entry
      # budgets on packages/ui/dist). Strict so a missing route or package entry
      # also fails (e.g. a build that silently stopped emitting an entry).
      - name: Bundle budget check (www first-load JS + @cooud/ui package entries)
        run: bun run bundle:check
        env:
          BUNDLE_CHECK_STRICT: "1"

      # --- Browser-driven gates: run AFTER Build (they serve the built app). ---
      # The Playwright config's webServer boots `next start` on the already-built
      # apps/www output, so Build must precede these steps.

      - name: Install Playwright browsers (Chromium)
        run: bunx playwright install --with-deps chromium

      - name: Accessibility (axe) on core routes
        run: bun run test:a11y

      - name: End-to-end (Playwright) core flows
        run: bun run test:e2e

      # Hard gate: `bun audit` is currently clean. The runtime PostCSS advisory
      # is resolved (overrides: postcss >=8.5.10) and the prior dev-only
      # vite/esbuild advisories (pulled transitively by vitest, never reached by
      # `vitest run` and never shipped to consumers) have cleared upstream. A new
      # advisory now fails CI; see docs/RELEASE_GOVERNANCE.md if a justified,
      # time-boxed exception is needed.
      - name: Audit (dependency vulnerabilities)
        run: bun run audit
