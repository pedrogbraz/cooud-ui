# Cooud UI CI — every gate the release script runs locally, on every PR.
#
# Two parallel jobs:
#   gates   — build + lint + typecheck + unit tests + the drift gates
#             (registry / tokens / props / example-sections) + bundle budgets
#             (strict: a missing tracked route also fails).
#   browser — Playwright against the built app: the axe a11y scan over the
#             core routes and the behavioral flows.
#
# The repo is public, so GitHub-hosted runners are free.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun run test
      - name: Registry in sync
        run: bun run registry:check
      - name: Tokens in sync
        run: bun run tokens:check
      - name: Props tables in sync
        run: bun run props:check
      - name: Example sections in sync
        run: bun run check:example-sections
      - name: Bundle budgets
        env:
          BUNDLE_CHECK_STRICT: "1"
        run: bun run bundle:check

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Accessibility scan (axe)
        run: bun run test:a11y
      - name: Behavioral flows
        run: bun run test:e2e
